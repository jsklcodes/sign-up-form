<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- css styles -->
  <link rel="stylesheet" href="assets/styles/styles.css">

  <title>Sign-up Form | The Odin Project</title>
</head>

<body>
  <main class="wrapper">
    <div class="sidebar">
      <div class="logo">
        <img src="assets/images/odin-lined.png" alt="">
        <span>Odin</span>
      </div>
      <p class="image-credits">
        Photo by
        <a
          href="https://unsplash.com/@frostroomhead?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Rodion
          Kutsaiev</a>
        on
        <a
          href="https://unsplash.com/pt-br/fotografias/049M_crau5k?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
      </p>
    </div>
    <div class="content-wrapper">
      <div class="info space-left">
        <p>
          This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams. Sign up
          <em>now</em> to get started.
        </p>
        <p>You <em>know</em> you want to.</p>
      </div>

      <form class="form space-left" id="sign-up-form">
        <h2>Let's do this!</h2>

        <div class="form-groups">
          <div class="form-group">
            <input type="text" class="form-control" id="first-name" name="first-name" placeholder="e.g. Jane" required>
            <label for="first-name">First Name</label>
          </div>

          <div class="form-group">
            <input type="text" class="form-control" id="last-name" name="last-name" placeholder="e.g. Doe" required>
            <label for="last-name">Last Name</label>
          </div>

          <div class="form-group">
            <input type="email" class="form-control" id="email" name="email" placeholder="e.g. example@email.com"
              pattern=".+@.+\.com" required>
            <label for="email">Email</label>
          </div>

          <div class="form-group">
            <input type="tel" class="form-control" id="phone-number" name="phone-number" placeholder="e.g. 123-123-1234"
              pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" required>
            <label for="phone-number">Phone number</label>
          </div>

          <div class="form-group">
            <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password"
              pattern="^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[a-zA-Z]).{8,}$" required>
            <label for="password">Password</label>
          </div>
          <span id="error-message"></span>

          <div class="form-group">
            <input type="password" class="form-control" id="confirm-password" name="confirm-password"
              placeholder="Confirm your password" placeholder="Confirm your password"
              pattern="^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[a-zA-Z]).{8,}$" required>
            <label for="confirm-password">Confirm password</label>
          </div>
        </div>
      </form>

      <div class="space-left">
        <button class="button" form="sign-up-form">Create Account</button>
        <p class="login-link">
          Already have an account? <a href="#">Log in</a>
        </p>
      </div>
    </div>
  </main>

  <script src="assets/scripts/index.js"></script>
</body>

</html>
